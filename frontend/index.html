<!DOCTYPE html>
<html>
<head>
  <title>EDP SBY 🔥</title>

  <!-- BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-menu {
      transition: 0.3s;
      cursor: pointer;
      border-radius: 15px;
    }

    .card-menu:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .title {
      font-size: 2.5rem;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container text-center">

  <div class="mb-5">
    <div class="title">📊 SE Monitoring</div>
    <p class="text-light">Sistem Monitoring EDP Toko</p>
  </div>

  <div class="row justify-content-center g-4">

    <!-- USER -->
    <div class="col-md-3">
      <div class="card card-menu p-4 text-dark" onclick="go('user.html')">
        <h4>👤 User</h4>
        <p>Cek kondisi toko</p>
      </div>
    </div>

    <!-- ADMIN -->
    <div class="col-md-3">
      <div class="card card-menu p-4 text-dark" onclick="go('admin.html')">
        <h4>⚙️ Admin</h4>
        <p>Upload & kelola data</p>
      </div>
    </div>

  </div>

</div>

<script>
function go(page){
  window.location.href = page;
}
</script>

</body>
</html>
