<!DOCTYPE html>
<html>
<head>
  <title>Admin - Monitoring SE EDP 🔥</title>

  <!-- BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- XLSX -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body {
      background: #f5f7fa;
    }

    .upload-box {
      border: 2px dashed #ccc;
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      background: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .upload-box:hover {
      border-color: #28a745;
      background: #f8fff9;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<div class="container py-5">

  <h3 class="mb-4">⚙️ Admin Upload Monitoring</h3>

  <div class="card shadow-sm p-4">

    <!-- UPLOAD AREA -->
    <div class="upload-box mb-3" onclick="document.getElementById('file').click()">
      <h5>📂 Klik atau Drag File</h5>
      <p class="text-muted">Support: CSV / XLSX</p>
      <input type="file" id="file" class="hidden" accept=".csv,.xlsx">
    </div>

    <!-- BUTTON -->
    <button onclick="uploadFile()" class="btn btn-success w-100">
      🚀 Upload Sekarang
    </button>

    <!-- STATUS -->
    <div id="status" class="mt-4"></div>

  </div>

</div>

<script>
const BASE = "https://cold-haze-26b9.muhammadrooby.workers.dev";

function setStatus(msg, type="info"){
  document.getElementById("status").innerHTML = `
    <div class="alert alert-${type}">
      ${msg}
    </div>
  `;
}

async function uploadFile() {
  const fileInput = document.getElementById("file");

  if (!fileInput.files.length) {
    setStatus("❌ Pilih file dulu", "danger");
    return;
  }

  const file = fileInput.files[0];

  setStatus("⏳ Processing file...", "warning");

  let rows = [];

  try {

    // ======================
    // XLSX
    // ======================
    if (file.name.endsWith(".xlsx")) {

      const data = await file.arrayBuffer();
      const workbook = XLSX.read(data);

      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      rows = XLSX.utils.sheet_to_json(sheet, { defval: "" });

    } else {

      // ======================
      // CSV
      // ======================
      const text = await file.text();

      const lines = text.split("\n").filter(x => x.trim());
      const header = lines[0].split(";").map(h => h.trim().toLowerCase());

      rows = lines.slice(1).map(line => {
        const cols = line.split(";");
        let obj = {};
        header.forEach((h, i) => obj[h] = cols[i]);
        return obj;
      });
    }

    setStatus("⏳ Uploading ke server...", "warning");

    // ======================
    // KIRIM KE WORKER
    // ======================
    const res = await fetch(BASE + "/upload", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(rows)
    });

    const result = await res.json();

    setStatus(`
      ✅ Upload sukses<br><br>
      <pre>${JSON.stringify(result, null, 2)}</pre>
    `, "success");

  } catch (e) {
    setStatus("❌ ERROR: " + e.message, "danger");
  }
}
</script>

</body>
</html>
