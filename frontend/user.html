<!DOCTYPE html>
<html>
<head>
  <title>Monitoring SE EDP SBY 🔥</title>

  <!-- 🔥 BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f5f7fa;
    }
    .card-ok {
      background: #d4edda;
      border-left: 5px solid #28a745;
    }
    .card-bad {
      background: #f8d7da;
      border-left: 5px solid #dc3545;
    }
  </style>
</head>

<body>

<div class="container py-4">

  <h3 class="mb-4">📊 Monitoring SE EDP SBY 🔥</h3>

  <!-- INPUT -->
  <div class="card p-3 mb-4 shadow-sm">
    <div class="row g-2">
      <div class="col-md-4">
        <input id="kdtk" class="form-control" placeholder="Masukkan KDTK">
      </div>
      <div class="col-md-2">
        <button onclick="check()" class="btn btn-success w-100">Check</button>
      </div>
    </div>
  </div>

  <!-- RESULT -->
  <div id="result" class="row g-3"></div>

</div>

<script>
const BASE = "https://cold-haze-26b9.muhammadrooby.workers.dev";

function toNumber(v){
  const match = String(v || "").match(/[\\d.]+/);
  return match ? parseFloat(match[0]) : 0;
}

function toStr(v){
  return String(v || "").toLowerCase();
}

async function check() {
  const kdtk = document.getElementById("kdtk").value;
  const result = document.getElementById("result");

  result.innerHTML = `<div class="text-center">Loading...</div>`;

  try {
    const res = await fetch(`${BASE}/check?kdtk=${kdtk}`);
    const data = await res.json();

    if (!Array.isArray(data) || data.length === 0) {
      result.innerHTML = `<div class="alert alert-danger">KDTK tidak ditemukan</div>`;
      return;
    }

    let html = "";

    data.forEach((d, i) => {
      const station = d.device_id || d.station || `Station ${i+1}`;
      let issues = [];

      const lan = toNumber(d.lan_speed);
      const suhu = toNumber(d.suhu);
      const boot = toNumber(d.boot_time);
      const bsod = toStr(d.status_bsod);
      const ups = toStr(d.ups_status);

      const bca_on = toNumber(d.edc_bca_on);
      const bca_off = toNumber(d.edc_bca_off);

      const m_on = toNumber(d.edc_mandiri_on) + toNumber(d.edc_mti_on);
      const m_off = toNumber(d.edc_mandiri_off) + toNumber(d.edc_mti_off);

      // RULES
      if (lan > 0 && lan < 1000) issues.push("LAN < 1000 Mbps");
      if (boot >= 2) issues.push("MYSQL lambat");
      if (suhu >= 80) issues.push("CPU panas");
      if (boot >= 4) issues.push("Boot lama");
      if (bsod.includes("nok")) issues.push("BSOD bermasalah");

      if (!ups.includes("terpasang") && !ups.includes("ok")) {
        issues.push("UPS tidak OK");
      }

      if ((bca_on + bca_off) > 0 && bca_on <= bca_off) {
        issues.push("EDC BCA OFF");
      }

      if ((m_on + m_off) > 0 && m_on <= m_off) {
        issues.push("EDC Mandiri/MTI OFF");
      }

      const statusClass = issues.length === 0 ? "card-ok" : "card-bad";

      html += `
        <div class="col-md-4">
          <div class="card ${statusClass} shadow-sm">
            <div class="card-body">
              <h5 class="card-title">🖥️ ${station}</h5>
              ${
                issues.length === 0
                  ? `<p class="text-success">✅ Semua normal</p>`
                  : `<ul class="mb-0">${issues.map(x => `<li>❌ ${x}</li>`).join("")}</ul>`
              }
            </div>
          </div>
        </div>
      `;
    });

    result.innerHTML = html;

  } catch (e) {
    result.innerHTML = `<div class="alert alert-danger">${e.message}</div>`;
  }
}
</script>

</body>
</html>
